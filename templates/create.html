<!DOCTYPE html>
<html>
<head>
    <title>Create Portfolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="form-container">
    <h2>Create Your Portfolio</h2>

    <form action="/portfolio" method="post">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="text" name="skills" placeholder="Your Skills" required>
        <input type="text" name="project" placeholder="Your Project" required>
        <input type="text" name="photo" placeholder="Photo URL" required>
        <input type="text" name="github" placeholder="GitHub Link" required>
        <input type="text" name="linkedin" placeholder="LinkedIn Link" required>

        <button type="submit" onclick="this.innerText='Generating...'">
            Generate Portfolio
        </button>
    </form>
</div>

</body>
</html>
